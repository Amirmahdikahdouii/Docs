baseURL = "https://amirmahdikahdouii.github.io/Docs/"
title = "Amir's Docs"
languageCode = "en-us"
defaultContentLanguage = "en"

enableRobotsTXT = true
enableGitInfo = true

[module]
[[module.imports]]
path = "github.com/imfing/hextra"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
noClasses = false

[menu]
[[menu.main]]
name = "Search"
weight = 1
[menu.main.params]
type = "search"
[[menu.main]]
name = "GitHub"
weight = 2
url = "https://github.com/Amirmahdikahdouii/Docs"
[menu.main.params]
icon = "github"

[params]
description = "Personal technical notes and documentation."

[params.navbar]
displayTitle = true
displayLogo = false

[params.footer]
displayCopyright = true
displayPoweredBy = true

[params.theme]
default = "system"
displayToggle = true

[params.search]
enable = true
type = "flexsearch"

[params.highlight]
[params.highlight.copy]
enable = true
display = "hover"

[params.editURL]
enable = true
base = "https://github.com/Amirmahdikahdouii/Docs/edit/main/content"

[params.page]
width = "wide"
